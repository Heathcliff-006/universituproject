<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои книги | Andreev A.A.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <h1 class="logo_title">Andreev A.A.</h1>
        </div>
        <nav class="menu">
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="book.html">Последние прочитанные книги</a></li>
                <li><a href="form.html">Связь со мной</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2>📚 Последние книги, которые я прочитал</h2>
        <!-- h2 — заголовок второго уровня -->

        <!-- КНИГА 1 -->
        <div class="book-item">
            <!-- book-item — блок с одной книгой -->
            <h3 class="book-title">«Кольцо Нибелунга» — Рихард Вагнер</h3>
            <!-- img — тег для вставки картинки -->
            <img class="book-cover" src="книга1.png" alt="Кольцо Нибелунга" width="300">
            <!-- src — путь к файлу картинки -->
            <!-- alt — альтернативный текст (показывается, если картинка не загрузилась, и для слабовидящих) -->
            <!-- width — ширина картинки в пикселях -->
        </div>

        <!-- КНИГА 2 -->
        <div class="book-item">
            <h3 class="book-title">«Мечтают ли андроиды об электроовцах?» — Филип К. Дик</h3>
            <img class="book-cover" src="книга2.jpg" alt="Мечтают ли андроиды" width="300">
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Andreev A.A.</p>
    </footer>

</body>
</html>
